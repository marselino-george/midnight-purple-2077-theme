name: Build VSIX

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore and build
        run: msbuild MidnightPurple2077Theme.csproj /restore /p:Configuration=Release /p:Platform=AnyCPU /p:DeployExtension=false

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightPurple2077Theme-vsix
          path: bin/Release/MidnightPurple2077Theme.vsix
          if-no-files-found: error
